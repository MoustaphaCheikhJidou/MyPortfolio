<body class="contact-page">

   <!-- ===== NAVBAR ===== -->
   <nav class="navbar navbar-default color-fill navbar-fixed-top">
      <div class="col-md-12">
         <div class="nav">
            <button class="btn-nav">
               <span class="icon-bar top"></span>

   <!-- ===== CONTACT SECTION ===== -->
   <section class="contact-section">
      <div class="container">

         <div class="contact-card reveal">

            <div class="contact-icon-box">
               <i class="fas fa-paper-plane"></i>
            </div>

            <h1 class="contact-title gradient-text">Let's Talk</h1>

               Drop me a message — I'd love to hear from you.

            <a href="mailto:elmoustapha.cheikh.jiddou@gmail.com" class="contact-email-btn">
               <i class="fas fa-envelope"></i>
               elmoustapha.cheikh.jiddou@gmail.com
            </a>

            <p class="contact-divider">— or reach me at —</p>

            <span class="contact-phone">+222 48 64 73 76</span>

            <div class="contact-socials">
               <a href="https://www.kaggle.com/jiddou26" target="_blank" class="contact-social-icon" title="Kaggle">
                  <i class="fab fa-kaggle"></i>
               </a>
               <a href="https://www.linkedin.com/in/el-moustapha-cheikh-jidou/" target="_blank" class="contact-social-icon" title="LinkedIn">

   <!-- Scripts -->
   <script src="js/jquery.js"></script>
   <script src="js/bootstrap.min.js"></script>
   <script src="js/modernizr.js"></script>
   <script src="js/script.js"></script>
   <script>
      // Scroll reveal
      const reveals = document.querySelectorAll('.reveal');
      const observer = new IntersectionObserver(entries => {
         entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
      }, { threshold: 0.1 });
      reveals.forEach(r => observer.observe(r));
   </script>
